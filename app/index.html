<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' data:">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ISCC</title>
  <style>
    ::-webkit-scrollbar {
      display: none;
    }
    :root {
      --bg:#0b0b0c; --panel:#121214; --muted:#a1a1aa; --text:#e5e7eb;
      --border:#27272a; --green:#22c55e; --red:#ef4444;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;background:var(--bg);color:var(--text);font:13px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif}
    .toolbar{position:sticky;top:0;z-index:5;display:flex;gap:12px;align-items:center;padding:10px 12px;background:linear-gradient(180deg,rgba(0,0,0,.55),rgba(0,0,0,0));backdrop-filter:saturate(1.2) blur(4px)}
    .title{font-weight:600;opacity:.9}
    #actions-bus-toggles{display:none;align-items:center;gap:8px;margin-left:auto;}
    #actions-bus-toggles.actions-bus-toggles--visible{display:flex;}
    .actions-bus-toggle{display:flex;align-items:center;gap:6px;padding:4px 6px;border:1px solid var(--border);border-radius:8px;background:rgba(24,24,27,0.7);color:var(--muted);font-size:12px;}
    .actions-bus-toggle input{margin:0;accent-color:var(--green);}
    /* leave space for bottom command line (approx 48px) */
    #wrap{height:calc(100% - 44px - 48px);overflow:auto}
    #grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;padding:10px 12px}
    .card{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:8px;display:flex;flex-direction:column;gap:8px}
    .row{display:flex;justify-content:space-between;align-items:center}
    .meta{display:flex;gap:8px;color:var(--muted);font-size:12px}
    .badge{padding:2px 6px;border-radius:999px;font-size:12px}
    .badge.up{background:rgba(34,197,94,.12);color:#86efac}
    .badge.down{background:rgba(239,68,68,.12);color:#fca5a5}
    .quad-line{display:grid;grid-template-columns:1fr 1.2fr 1fr 1fr;gap:6px}
    input.num{width:100%;padding:6px 7px;border:1px solid var(--border);border-radius:8px;background:#0f0f11;color:var(--text);outline:none}
    input.num.sl{border-color:rgba(239,68,68,.35)}
    input.num.tp{border-color:rgba(34,197,94,.35)}
    .btns{display:grid;gap:6px}
    .btn{padding:7px 8px;border:1px solid var(--border);border-radius:8px;background:#18181b;color:#fff;cursor:pointer}
    .btn:hover{filter:brightness(1.1)}
    /* Кнопки: направления по цветам */
    .btn.bl,
    .btn.bc { background: var(--green); } /* зелёные: BL, BC */

    .btn.sl,
    .btn.sc { background: var(--red); }   /* красные: SL, SC */

    /* опционально можно слегка усилить hover */
    .btn:hover { filter: brightness(1.08); }

    /* чтобы disabled не путал — просто делаем бледнее */
    button:disabled { opacity: 0.5; pointer-events: none; }

    /* Новые стили для требований */
    .card.card--invalid { opacity: 0.55; filter: grayscale(0.2); }
    .input--error { border: 1px solid red !important; }

    /* Спрятать стрелочки у number */
    input[type=number]::-webkit-outer-spin-button,
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance:none; margin:0; }
    input[type=number] { -moz-appearance:textfield; }

    /* micro cards */
    .card--mini { padding: 2px 6px; gap: 0; }

    .card__status { width:10px; height:10px; border-radius:50%; display:none; margin-left:6px; }
    .card__status--pending { background:#9ca3af; }
    .card__status--pending-exec { background:#9ca3af; color:#000; border-radius:4px; padding:2px 6px; width:auto; height:auto; }
    .card__status--placed { background:#3b82f6; }
    .card__status--executing { background:#3b82f6; }
    .card__status--profit { background:var(--green); }
    .card__status--loss { background:var(--red); }
    .retry-btn { width:22px; height:22px; border-radius:50%; border:1px solid var(--border); background:#18181b; color:#fff; font-size:11px; margin-left:6px; cursor:pointer; }
    .retry-btn:hover{filter:brightness(1.1)}
    .card__note{font-size:12px;color:var(--red);display:none}

    /* settings panel */
    #settings-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px;cursor:pointer;color:var(--text);}
    #settings-btn:hover{filter:brightness(1.1)}
    #settings-btn.settings-restart-required{border-color:#f59e0b;color:#fbbf24;box-shadow:0 0 0 1px rgba(245,158,11,.2)}
    #settings-panel{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:10;}
    #settings-dialog{background:var(--panel);border:1px solid var(--border);border-radius:8px;width:600px;min-height:300px;display:flex;overflow:hidden;position:relative;height:80vh;}
    #settings-restart-required{display:none;position:absolute;left:160px;right:36px;top:7px;padding:4px 8px;border:1px solid rgba(245,158,11,.5);border-radius:5px;background:rgba(245,158,11,.12);color:#fbbf24;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;z-index:1;}
    #settings-sections{width:150px;border-right:1px solid var(--border);padding:32px 10px 10px;display:flex;flex-direction:column;gap:4px;overflow:auto;}
    #settings-sections div{cursor:pointer;padding:4px;border-radius:4px;}
    #settings-sections div:hover{background:rgba(255,255,255,0.05)}
    #settings-sections div.active{background:rgba(255,255,255,0.1);}
    #settings-sections hr{border:none;border-top:1px solid var(--border);margin:4px 0;}
    #settings-fields{flex:1;padding:32px 10px 10px;overflow:auto;}
    #settings-fields label{display:flex;align-items:center;gap:8px;margin-bottom:8px;width:100%;}
    #settings-fields label span{flex:1;min-width:0;}
    #settings-fields label input[type="text"],
    #settings-fields label input[type="number"]{flex:0 1 200px;min-width:80px;padding:6px 7px;border:1px solid var(--border);border-radius:8px;background:#0f0f11;color:var(--text);}
    #settings-fields .settings-group{margin-left:16px;border-left:1px solid var(--border);padding-left:8px;margin-bottom:8px;}
    #settings-fields .settings-group-title{margin:8px 0;font-weight:bold;}
    #settings-fields .settings-array-remove{margin-left:8px;background:none;border:none;color:var(--text);cursor:pointer;}
    #settings-fields .settings-array-add{margin-top:4px;border:1px dashed var(--border);background:#18181b;color:var(--text);border-radius:4px;padding:4px 8px;cursor:pointer;}
    #settings-fields .settings-window-state{margin-left:0;margin-bottom:12px;}
    #settings-fields .settings-window-state-current{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;color:var(--muted);margin-bottom:8px;}
    #settings-fields .settings-window-state-actions{display:flex;gap:8px;flex-wrap:wrap;}
    #settings-fields .settings-window-state-actions button{border:1px solid var(--border);background:#18181b;color:var(--text);border-radius:4px;padding:4px 8px;cursor:pointer;}
    #settings-fields .settings-window-state-actions button:hover{filter:brightness(1.1)}
    #settings-fields .settings-editor-controls{display:flex;gap:4px;margin-bottom:10px;}
    #settings-fields .settings-editor-controls button{border:1px solid var(--border);background:#18181b;color:var(--muted);border-radius:4px;padding:5px 10px;cursor:pointer;}
    #settings-fields .settings-editor-controls button.active{background:rgba(255,255,255,.1);color:var(--text);border-color:#52525b;}
    #settings-fields .settings-raw-editor textarea{box-sizing:border-box;width:100%;resize:vertical;padding:10px;border:1px solid var(--border);border-radius:6px;background:#0f0f11;color:var(--text);font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;line-height:1.45;tab-size:2;}
    #settings-fields .settings-raw-editor textarea[data-role="raw-json"]{min-height:48vh;}
    #settings-fields .settings-snippet-toggle{margin-top:8px;border:1px dashed var(--border);background:#18181b;color:var(--text);border-radius:4px;padding:5px 9px;cursor:pointer;}
    #settings-fields .settings-snippet-panel{margin-top:8px;padding:8px;border:1px solid var(--border);border-radius:6px;background:rgba(0,0,0,.15);}
    #settings-fields .settings-snippet-panel textarea{min-height:100px;}
    #settings-fields .settings-snippet-actions{display:flex;gap:6px;margin-top:8px;}
    #settings-fields .settings-snippet-actions button{border:1px solid var(--border);background:#18181b;color:var(--text);border-radius:4px;padding:4px 8px;cursor:pointer;}
    #settings-fields .settings-raw-editor textarea:focus{outline:1px solid #71717a;border-color:#71717a;}
    #settings-fields .settings-raw-error{margin-top:6px;color:var(--red);font-size:12px;white-space:pre-wrap;}
    #settings-close{position:absolute;top:8px;right:6px;border:none;background:none;color:var(--text);cursor:pointer;}

    /* command line input at bottom */
    #cmdline-wrap{position:fixed;left:0;bottom:0;width:100%;height:48px;padding:6px 12px;background:rgba(0,0,0,.55);backdrop-filter:saturate(1.2) blur(4px);}
    #cmdline{width:100%;height:100%;padding:6px 7px;border:1px solid var(--border);border-radius:8px;background:#0f0f11;color:var(--text);outline:none;}
  </style>
</head>
<body>
  <div class="toolbar">
    <div class="title">ISCC</div>
    <input id="filter" placeholder="Filter: ticker prefix…" />
    <div id="actions-bus-toggles"></div>
    <button id="settings-btn" title="Settings">⚙</button>
  </div>
  <div id="settings-panel">
    <div id="settings-dialog">
      <button id="settings-close">✖</button>
      <div id="settings-restart-required" title="Saved settings that will take effect after restarting ISCC"></div>
      <div id="settings-sections"></div>
      <div id="settings-fields"></div>
    </div>
  </div>
  <div id="wrap">
    <div id="grid"></div>
  </div>
  <div id="cmdline-wrap">
    <input id="cmdline" placeholder="Enter command" />
  </div>
  <script src="./renderer.js"></script>
</body>
</html>
